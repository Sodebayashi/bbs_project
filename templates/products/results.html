{% extends 'base.html' %}
{% block content %}
  <h1 class="mt-5">検索結果：</h1>
  {% if productss %}
    {% for products in productss %}
      <div class="card bg-light shadow-sm mt-3">
	        <div class="card-body">
          <p>{{ products.id }}:{{ products.author }}:{{ products.created_at }}</p>
          <p><a href="{% url 'products:detail' products.id %}">{{ products.content }}</a></p>
        </div>
      </div>
    {% endfor %}
  {% else %}
    <p>"{{ searchform.words.value }}"に一致する投稿はありません。</p>
  {% endif %}
{% endblock %}
